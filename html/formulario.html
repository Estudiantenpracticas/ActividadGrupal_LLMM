<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de contacto - ¡El juego ha finalizado!">
    <link rel="stylesheet" href="../css/formulario.css">
    <link rel="shortcut icon" href="../imagenes/c6a8a289-ee76-4cbc-9f6c-8c31f5eb210e.jpg" type="image/x-icon">
    <title>¡El juego ha finalizado!</title>
</head>
<body>

    <header>
        <div class="menu-principal">
            <div class="logo">
                <a href="../index.html">Game<span>News</span></a>
            </div>
            <nav>
                <ul class="menu">
                    <li><a class="menu-enlace" href="../index.html">Inicio</a></li>
                    <li><a class="menu-enlace" href="../noticias.html">Noticias</a></li>
                    <li><a class="menu-enlace" href="../lanzamientos.html">Próximos Juegos</a></li>
                    <li><a class="menu-enlace" href="formulario.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="form">
        <h1 class="fuentegrande">¡El juego ha finalizado!</h1>
        
        <form action="mailto:angela@ejemplo.com" method="post" enctype="text/plain">
            <fieldset class="datosPersonales">
                <legend>Datos personales</legend>
                
                <label for="nombre">Nombre: <input type="text" name="nombre" id="nombre" required></label>
                <label for="apellidos">Apellidos: <input type="text" name="apellidos" id="apellidos" required></label>
                <label for="correoElectronico">Email: <input type="email" name="correoElectronico" id="correoElectronico" required></label>
                
                <fieldset class="sexo">
                    <legend>Sexo</legend>
                    <label><input type="radio" name="genero" value="hombre"> Hombre</label>
                    <label><input type="radio" name="genero" value="mujer"> Mujer</label>
                </fieldset>

                <label for="personaje">Tu juego favorito:
                    <select name="personaje" id="personaje">
                        <option value="pokemon">Pokemon</option>
                        <option value="gta6">Gta 6</option>
                        <option value="ninguno">Ninguno</option>
                    </select>
                </label>

                <label for="comentarios">Comentario:
                    <textarea name="comentarios" id="comentarios" rows="3" placeholder="Escribe aquí..."></textarea>
                </label>
                
                <div class="botones-container">
                    <input type="reset" value="Borrar" class="btn-borrar">
                    <input type="submit" value="Enviar Mensaje" class="btn-enviar">
                </div>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>© 2026 GameNews - Trabajo grupal Lenguajes de Marcas</p>
    </footer>

</body>
</html>
