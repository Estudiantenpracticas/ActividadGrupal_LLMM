<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de contacto - ¡El juego ha finalizado!">
    <link rel="stylesheet" href="../css/formulario.css">
    <link rel="shortcut icon" href="img/c6a8a289-ee76-4cbc-9f6c-8c31f5eb210e.jpg" type="image/x-icon">
    <title>¡Que comience el juego!</title>
</head>
<body>
    <main>
        <div class="form">
            <h1 class="fuentegrande"> ¡El juego ha finalizado!</h1>
            <form action="mailto:a@gmail.com" method="post" enctype="text/plain">
                <fieldset class="datosPersonales">
                    <legend>Datos personales</legend>
                    <label>Nombre: <input type="text" name="nombre" id="nombre" required></label>
                    <label>Apellidos: <input type="text" name="apellidos" id="apellidos" required></label>
                    <label>Dirección: <input type="text" name="direccion" id="direccion"></label>
                    <label>Código postal: <input type="number" name="codigoPostal" id="codigoPostal"></label>
                    <label>Ciudad: <input type="text" name="ciudad" id="ciudad"></label>
                    <label>DNI: <input type="text" name="dni" id="dni"></label>
                    <label>Correo electrónico: <input type="email" name="correoElectronico" id="correoElectronico" required></label>
                    <fieldset class="sexo">
                        <legend>Sexo</legend>
                        <label><input type="radio" name="genero" value="hombre"> Hombre</label>
                        <label><input type="radio" name="genero" value="mujer"> Mujer</label>
                    </fieldset>
                    <label>Fecha de nacimiento: <input type="date" name="fechaNacimiento" id="fechaNacimiento"></label>
                    <label>¿Cual ha sido tu juego favorito?:
                        <select name="personaje" id="personaje">
                            <option value="pokemon">Pokemon</option>
                            <option value="grandtheftauto">Gran theft auto</option>
                            <option value="world of warcraft">World of warcraft</option>
                            <option value="residentevil">Resident Evil</option>
                            <option value="gta6">Gta 6</option>
                            <option value="ninguno">Ninguno de los nombrados</option>
                        </select>
                    </label>
                    <label>Deja un comentario:
                        <textarea name="comentarios" id="comentarios" cols="30" rows="4" placeholder="Escribe aquí..."></textarea>
                    </label>
                    <label>Adjuntar archivo: <input type="file" name="archivo" id="archivo"></label>
                    <input type="reset" value="Borrar">
                    <input type="submit" value="Enviar">
                </fieldset>
            </form>
        </div>
    </main>
    <!-- FOOTER -->
    <footer>
        <p>© 2026 GameNews - Trabajo grupal Lenguajes de Marcas</p>
    </footer>
</body>
</html>
